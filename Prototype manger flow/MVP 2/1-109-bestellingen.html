<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 Bestellingen Overzicht — Bakkerij Wolf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'GT America Extended';
      src: url('assets/GT America Extended Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    :root { --stroke: #b5ae9c; --wolf-white: #f9f7f2; --wolf-grey: #1e1e1e; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    .font-gt-ext-rg { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 400; }
    .font-gt-ext-md { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 600; }
    .font-gt-rg     { font-family: Arial, sans-serif; font-weight: 400; }
    .font-gt-bd     { font-family: Arial, sans-serif; font-weight: 700; }
    .inter-regular  { font-family: 'Inter', sans-serif; font-weight: 400; }
    .inter-medium   { font-family: 'Inter', sans-serif; font-weight: 500; }
    .inter-bold     { font-family: 'Inter', sans-serif; font-weight: 700; }
    a.nav-item { display: flex; flex-direction: column; width: 100%; text-decoration: none; }
    a.nav-item:hover { background-color: rgba(249,247,242,0.5); }
  </style>
</head>
<body class="bg-[#dfdacd] flex flex-col w-full h-full">

  <!-- Top nav bar -->
  <header class="border-b border-[#b5ae9c] flex items-center justify-between px-8 py-6 shrink-0 w-full">
    <div class="flex gap-5 items-center">
      <div class="h-[30px] w-[27px] shrink-0">
        <img alt="" class="block w-full h-full object-contain" src="assets/wolf logo 1.svg">
      </div>
      <p class="font-gt-ext-rg text-black tracking-[6.4px] uppercase whitespace-nowrap text-[16px]">
        Bakkerij <span class="font-gt-ext-md">Wolf</span>
      </p>
    </div>
    <div class="relative flex items-center bg-[#f9f7f2] rounded-[100px] px-4 py-2 whitespace-nowrap">
      <span class="font-gt-rg text-[14px] text-[#1e1e1e]">Noor</span>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 w-full">

    <!-- Sidebar -->
    <aside data-wolf-sidebar="bestellingen" class="border-r border-[#b5ae9c] flex flex-col h-full shrink-0 w-[271px] pt-10 pb-4"></aside>

    <!-- Main -->
    <main class="bg-[#f9f7f2] flex flex-1 flex-col gap-6 h-full overflow-y-auto min-w-0 p-10">

      <!-- Header -->
      <div class="flex flex-col gap-3 shrink-0 w-full">
        <p id="datum-tijd" class="inter-regular text-[#2e2e2e] text-[16px] w-full"></p>
        <p class="inter-bold text-[32px] text-black w-full">Bestellingen</p>
        <p class="inter-regular text-[#2e2e2e] text-[16px] w-full">Controleer de definitieve bestellingen per leverdag voordat je de dag afsluit.</p>

        <!-- Week tabs (dynamisch) -->
        <div id="week-tabs" class="flex gap-6 items-start"></div>
      </div>

      <!-- Leverdag-secties (dynamisch per geselecteerde week) -->
      <div id="leverdagen" class="flex flex-col gap-6 w-full"></div>

    </main>
  </div>

  <!-- Kalender-modal (pop-up) -->
  <div id="kal-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background: rgba(30,30,30,0.45);" onclick="if (event.target === this) sluitKalender()">
    <div class="bg-[#f9f7f2] border border-[#b5ae9c] rounded-[12px] p-8" style="width: 560px;">
      <div class="flex items-start justify-between mb-1">
        <p class="inter-bold text-[22px] text-black">Kies een leverdag</p>
        <button onclick="sluitKalender()" class="w-8 h-8 rounded-full flex items-center justify-center bg-transparent border-0 cursor-pointer hover:bg-[#ece8df]">
          <span class="inter-regular text-[22px] text-[#1e1e1e] leading-none">&times;</span>
        </button>
      </div>
      <p class="inter-regular text-[#6b6456] text-[14px] mb-5">Leverdagen zijn dinsdag, donderdag en zaterdag.</p>
      <!-- Maand-navigatie -->
      <div class="flex items-center justify-between mb-6">
        <button id="kal-prev" class="w-9 h-9 rounded-full border border-[#b5ae9c] flex items-center justify-center hover:bg-[#ece8df] cursor-pointer bg-transparent">
          <span class="inter-regular text-[18px] text-[#1e1e1e]">&lsaquo;</span>
        </button>
        <p id="kal-maand" class="inter-bold text-[20px] text-black"></p>
        <button id="kal-next" class="w-9 h-9 rounded-full border border-[#b5ae9c] flex items-center justify-center hover:bg-[#ece8df] cursor-pointer bg-transparent">
          <span class="inter-regular text-[18px] text-[#1e1e1e]">&rsaquo;</span>
        </button>
      </div>
      <!-- Weekdag-koppen -->
      <div class="grid grid-cols-7 gap-1 mb-2">
        <p class="inter-regular text-[#979797] text-[14px] text-center">M</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">D</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">W</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">D</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">V</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">Z</p>
        <p class="inter-regular text-[#979797] text-[14px] text-center">Z</p>
      </div>
      <div id="kal-grid" class="grid grid-cols-7 gap-1"></div>
      <div class="flex gap-6 items-center mt-6">
        <div class="flex gap-2 items-center">
          <div class="w-3 h-3 rounded-full" style="background-color: #c9c2b0;"></div>
          <p class="inter-regular text-[#2e2e2e] text-[14px]">Leverdag</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="w-3 h-3 rounded-full bg-[#1e1e1e]"></div>
          <p class="inter-regular text-[#2e2e2e] text-[14px]">Vandaag</p>
        </div>
        <div class="flex gap-2 items-center">
          <div class="w-3 h-3 rounded-full" style="background-color: #ece8df;"></div>
          <p class="inter-regular text-[#2e2e2e] text-[14px]">Geen leverdag</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const W = window.WolfData;
    W.bindKlok('datum-tijd');
    const nu = W.nu();

    // ---- Statusbadge ---------------------------------------------------------
    function badge(kleurBg, kleurDot, kleurText, tekst) {
      return `<div class="${kleurBg} flex gap-2 items-center px-3 py-1 rounded-[100px]">
        <div class="w-[7px] h-[7px] rounded-full shrink-0" style="background-color: ${kleurDot};"></div>
        <p class="inter-medium text-[14px] uppercase whitespace-nowrap" style="color:${kleurText};">${tekst}</p></div>`;
    }

    // ---- Week-tabs -----------------------------------------------------------
    function weekRange(offset) {
      const ma = W.startOfWeek(new Date(nu));
      ma.setDate(ma.getDate() + offset * 7);
      const zo = new Date(ma); zo.setDate(zo.getDate() + 6);
      const m1 = W.MAANDEN[ma.getMonth()].slice(0, 3);
      const m2 = W.MAANDEN[zo.getMonth()].slice(0, 3);
      const range = ma.getMonth() === zo.getMonth()
        ? `${ma.getDate()}–${zo.getDate()} ${m2}`
        : `${ma.getDate()} ${m1} – ${zo.getDate()} ${m2}`;
      return { wk: W.weeknummer(ma), range: range };
    }

    // Standaard de week met de focusdag (eerstvolgende open leverdag).
    const focusId = (W.getDeliveryDays().find(function (d) { return d.isFocus; }) || {}).id;
    function bepaalStartWeek() {
      for (let off = 0; off <= 2; off++) {
        if (W.getWeekLeverdagen(off).some(function (d) { return d.id === focusId; })) return off;
      }
      return 0;
    }
    let selectedWeek = bepaalStartWeek();

    function renderWeekTabs() {
      const tabs = [0, 1, 2].map(function (off) {
        const w = weekRange(off);
        const actief = off === selectedWeek;
        const cls = actief ? 'bg-[#dfdacd] border border-[#1e1e1e]' : 'border border-[#b5ae9c] hover:bg-[#f0ece3]';
        return `
          <div onclick="selectWeek(${off})" class="${cls} flex flex-col items-center px-6 py-4 rounded-[8px] shrink-0 w-[200px] cursor-pointer">
            <div class="flex flex-col gap-[10px] items-start w-full">
              <p class="inter-regular text-[#2e2e2e] text-center tracking-[0.32px] uppercase w-full text-[16px]">Week ${w.wk}</p>
              <p class="inter-bold text-black text-[16px] w-full text-center">${w.range}</p>
            </div>
          </div>`;
      }).join('');
      const kal = `
        <div onclick="openKalender()" class="border border-[#b5ae9c] flex flex-col gap-2 items-center justify-center px-6 py-4 rounded-[8px] self-stretch shrink-0 w-[154px] cursor-pointer hover:bg-[#fdfbf7]">
          <div class="h-[19px] w-[17px]"><img alt="" class="block w-full h-full object-contain" src="assets/calendar.svg"></div>
          <p class="inter-bold text-[16px] text-black">Kalender</p>
        </div>`;
      document.getElementById('week-tabs').innerHTML = tabs + kal;
    }

    function selectWeek(off) { selectedWeek = off; renderWeekTabs(); renderDagen(); }
    window.selectWeek = selectWeek;

    // ---- Compacte dag-sectie (dag + status + samenvatting) -------------------
    function daySection(d) {
      const orders = W.getOrders(d.id);
      const aanvragen = d.isFocus ? W.getAanvragen() : [];
      const open = aanvragen.filter(function (a) { return a.status === 'te-beoordelen'; }).length;
      const sm = d.sluitMoment;

      let badgeHtml, knopTekst, knopHref, samenvatting, rijHref, toonKnop = true;

      if (d.state === 'geleverd') {
        badgeHtml = badge('bg-[#c8f4ce]', '#1c892b', '#1c892b', 'Geleverd');
        knopTekst = 'Paklijst bekijken'; knopHref = '1-441-paklijst.html';
        samenvatting = `${orders.length} bestellingen geleverd`;
        rijHref = `1-299-bestellingen-per-datum.html?dag=${d.id}`;
      } else if (d.state === 'gesloten') {
        badgeHtml = badge('bg-[#e5e5e5]', '#737373', '#737373', 'Gesloten');
        knopTekst = 'Paklijst bekijken'; knopHref = '1-441-paklijst.html';
        samenvatting = `${orders.length} bestellingen verwerkt — paklijst aangemaakt`;
        rijHref = `1-299-bestellingen-per-datum.html?dag=${d.id}`;
      } else if (d.isFocus) {
        // Eerstvolgende open leverdag: sluiten-actie
        if (open > 0) {
          badgeHtml = badge('bg-[#f4e0c8]', '#c45d1d', '#c45d1d', `${open} open aanvra${open === 1 ? 'ag' : 'gen'}`);
        } else {
          badgeHtml = badge('bg-[#c8f4ce]', '#1c892b', '#1c892b', 'Gereed om te sluiten');
        }
        knopTekst = 'Bestellingen sluiten'; knopHref = '1-356-sluiten.html';
        samenvatting = `${orders.length} ingeplande orders${aanvragen.length ? ' + ' + aanvragen.length + ' aanvragen' : ''}`;
        rijHref = `1-299-bestellingen-per-datum.html?dag=${d.id}`;
      } else {
        badgeHtml = badge('bg-[#c8f4ce]', '#32b443', '#32b443', 'Open');
        // Geen knop: de rij "X ingeplande orders" is al klikbaar (zelfde bestemming).
        toonKnop = false;
        samenvatting = `${orders.length} ingeplande orders`;
        rijHref = `1-299-bestellingen-per-datum.html?dag=${d.id}`;
      }

      return `
        <div class="flex flex-col gap-2 shrink-0 w-full">
          <div class="flex items-center justify-between w-full">
            <div class="flex gap-4 items-center">
              <p class="inter-medium text-[20px] text-black whitespace-nowrap">${d.label}</p>
              ${d.isFocus ? '<div class="bg-[#1e1e1e] flex items-center px-3 py-1 rounded-[100px]"><p class="inter-medium text-[14px] text-white uppercase whitespace-nowrap">Eerstvolgende leverdag</p></div>' : ''}
              ${badgeHtml}
            </div>
            ${toonKnop ? `<a href="${knopHref}" class="bg-[#2e2e2e] flex items-center justify-center px-4 py-2 rounded-[8px] no-underline hover:bg-[#1e1e1e]">
              <p class="inter-regular text-[16px] text-white whitespace-nowrap">${knopTekst}</p>
            </a>` : ''}
          </div>
          <div class="border border-[#b5ae9c] flex flex-col overflow-hidden rounded-[8px] w-full">
            <div class="bg-[#f4f0e7] flex gap-5 items-center pl-6 pr-4 py-4 w-full cursor-pointer hover:bg-[#f0ebe0]" onclick="window.location.href='${rijHref}'">
              <div class="flex flex-1 gap-6 items-center min-w-0">
                <div class="flex items-center"><p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap">${samenvatting}</p></div>
              </div>
              <div class="w-5 h-5 shrink-0"><img alt="" class="block w-full h-full object-contain" src="assets/arrow-right.svg"></div>
            </div>
          </div>
        </div>`;
    }

    function renderDagen() {
      const dagen = W.getWeekLeverdagen(selectedWeek);
      document.getElementById('leverdagen').innerHTML = dagen.map(daySection).join('');
    }

    // ---- Kalender-modal ------------------------------------------------------
    let toonMaand = nu.getMonth();
    let toonJaar = nu.getFullYear();
    function pad2(n) { return String(n).padStart(2, '0'); }

    function renderKalender() {
      document.getElementById('kal-maand').textContent =
        `${W.MAANDEN[toonMaand].charAt(0).toUpperCase() + W.MAANDEN[toonMaand].slice(1)} ${toonJaar}`;
      const eerste = new Date(toonJaar, toonMaand, 1);
      const startOffset = (eerste.getDay() + 6) % 7;
      const dagenInMaand = new Date(toonJaar, toonMaand + 1, 0).getDate();
      const vandaagStr = nu.toDateString();
      let cells = '';
      for (let i = 0; i < startOffset; i++) cells += '<div></div>';
      for (let dd = 1; dd <= dagenInMaand; dd++) {
        const datum = new Date(toonJaar, toonMaand, dd);
        const isLever = W.LEVER_WEEKDAGEN.indexOf(datum.getDay()) !== -1;
        const isVandaag = datum.toDateString() === vandaagStr;
        const id = `${toonJaar}-${pad2(toonMaand + 1)}-${pad2(dd)}`;
        if (isVandaag) {
          cells += `<button onclick="window.location.href='1-299-bestellingen-per-datum.html?dag=${id}'" class="aspect-square rounded-full flex items-center justify-center cursor-pointer bg-[#1e1e1e] border-0"><span class="inter-medium text-[15px] text-white">${dd}</span></button>`;
        } else if (isLever) {
          cells += `<button onclick="window.location.href='1-299-bestellingen-per-datum.html?dag=${id}'" class="aspect-square rounded-full flex items-center justify-center cursor-pointer border-0 hover:opacity-80" style="background-color:#c9c2b0;"><span class="inter-medium text-[15px] text-[#1e1e1e]">${dd}</span></button>`;
        } else {
          cells += `<div class="aspect-square rounded-full flex items-center justify-center" style="background-color:#ece8df;"><span class="inter-regular text-[15px] text-[#b5ae9c]">${dd}</span></div>`;
        }
      }
      document.getElementById('kal-grid').innerHTML = cells;
    }

    function openKalender() {
      toonMaand = nu.getMonth(); toonJaar = nu.getFullYear();
      renderKalender();
      const m = document.getElementById('kal-modal');
      m.classList.remove('hidden'); m.classList.add('flex');
    }
    function sluitKalender() {
      const m = document.getElementById('kal-modal');
      m.classList.add('hidden'); m.classList.remove('flex');
    }
    window.openKalender = openKalender;
    window.sluitKalender = sluitKalender;

    document.getElementById('kal-prev').addEventListener('click', function () {
      toonMaand--; if (toonMaand < 0) { toonMaand = 11; toonJaar--; } renderKalender();
    });
    document.getElementById('kal-next').addEventListener('click', function () {
      toonMaand++; if (toonMaand > 11) { toonMaand = 0; toonJaar++; } renderKalender();
    });

    // ---- Init ----------------------------------------------------------------
    renderWeekTabs();
    renderDagen();
  </script>

</body>
</html>
