<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7 Klantprofiel — Bakkerij Wolf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'GT America Extended';
      src: url('assets/GT America Extended Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    :root { --stroke: #b5ae9c; --wolf-white: #f9f7f2; --wolf-grey: #1e1e1e; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    .font-gt-ext-rg { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 400; }
    .font-gt-ext-md { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 600; }
    .font-gt-rg     { font-family: Arial, sans-serif; font-weight: 400; }
    .font-gt-bd     { font-family: Arial, sans-serif; font-weight: 700; }
    .inter-regular  { font-family: 'Inter', sans-serif; font-weight: 400; }
    .inter-medium   { font-family: 'Inter', sans-serif; font-weight: 500; }
    .inter-bold     { font-family: 'Inter', sans-serif; font-weight: 700; }
    a.nav-item { display: flex; flex-direction: column; width: 100%; text-decoration: none; }
    a.nav-item:hover { background-color: rgba(249,247,242,0.5); }
  </style>
</head>
<body class="bg-[#dfdacd] flex flex-col w-full h-full">

  <!-- Top nav bar -->
  <header class="border-b border-[#b5ae9c] flex items-center justify-between px-8 py-6 shrink-0 w-full">
    <div class="flex gap-5 items-center">
      <div class="h-[30px] w-[27px] shrink-0">
        <img alt="" class="block w-full h-full object-contain" src="assets/wolf logo 1.svg">
      </div>
      <p class="font-gt-ext-rg text-black tracking-[6.4px] uppercase whitespace-nowrap text-[16px]">
        Bakkerij <span class="font-gt-ext-md">Wolf</span>
      </p>
    </div>
    <div class="relative flex items-center bg-[#f9f7f2] rounded-[100px] px-4 py-2 whitespace-nowrap">
      <span class="font-gt-rg text-[14px] text-[#1e1e1e]">Noor</span>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 w-full">

    <!-- Sidebar -->
    <aside class="border-r border-[#b5ae9c] flex flex-col h-full shrink-0 w-[271px] pt-10 pb-4">
      <nav class="flex flex-col w-full">
        <a href="1-23-dashboard.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Dashboard</p>
        </a>
        <a href="1-109-bestellingen.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Bestellingen</p>
        </a>
        <a href="1-298-aanvragen.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Aanvragen</p>
        </a>
        <a href="1-441-paklijst.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Paklijsten</p>
        </a>
        <a href="1-336-klanten-overzicht.html" class="nav-item bg-[#f9f7f2] border-l-4 border-black px-8 py-3">
          <p class="font-gt-bd text-[18px] text-[#1e1e1e] w-full">Klanten</p>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="bg-[#f9f7f2] flex flex-1 flex-col gap-6 h-full overflow-y-auto min-w-0 p-10">

      <!-- Header -->
      <div class="flex flex-col gap-3 shrink-0 w-full">
        <!-- Breadcrumb -->
        <div class="flex gap-2 inter-regular text-[#2e2e2e] text-[16px] whitespace-nowrap">
          <a href="1-336-klanten-overzicht.html" class="text-[#2e2e2e] no-underline hover:underline">Klanten</a>
          <span>&gt;</span>
          <span id="bc-klant"></span>
        </div>

        <!-- Title row -->
        <div class="flex gap-3 items-center w-full">
          <p id="titel-klant" class="inter-bold text-[32px] text-black whitespace-nowrap"></p>
          <div id="type-pill"></div>
          <div id="bewerken-btn" class="bg-[#2e2e2e] flex gap-2 items-center justify-center px-4 py-2 rounded-[100px] cursor-pointer">
            <div class="w-[15px] h-[15px] shrink-0">
              <img alt="" class="block w-full h-full object-contain" src="assets/pencil.svg">
            </div>
            <p class="inter-regular text-[16px] text-white whitespace-nowrap">Bewerken</p>
          </div>
        </div>
      </div>

      <!-- Two-column content -->
      <div class="flex gap-6 items-start shrink-0 w-full">

        <!-- Left column -->
        <div class="flex flex-col gap-6 min-w-0" style="width: 540.5px;">

          <!-- Contactgegevens card -->
          <div class="bg-[#dfdacd] border border-[#b5ae9c] flex flex-col gap-3 p-6 rounded-[8px] w-full">
            <p class="inter-regular text-[#979797] text-[16px] tracking-[0.32px] uppercase w-full">Contactgegevens</p>

            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black whitespace-nowrap w-[178px]">Contactpersoon</p>
              <p id="kg-contact" class="inter-bold text-[16px] text-[#1e1e1e] whitespace-nowrap"></p>
            </div>
            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black whitespace-nowrap w-[178px]">Telefoon</p>
              <p id="kg-telefoon" class="inter-bold text-[16px] text-[#1e1e1e] whitespace-nowrap"></p>
            </div>
            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black whitespace-nowrap w-[178px]">Email</p>
              <p id="kg-email" class="inter-bold text-[16px] text-[#1e1e1e] whitespace-nowrap"></p>
            </div>
            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black w-[178px]">Adres</p>
              <div id="kg-adres" class="flex flex-col items-end gap-1"></div>
            </div>
          </div>

          <!-- Bestelrechten card -->
          <div class="bg-[#dfdacd] border border-[#b5ae9c] flex flex-col gap-3 p-6 rounded-[8px] w-full">
            <p class="inter-regular text-[#979797] text-[16px] tracking-[0.32px] uppercase w-full">Bestelrechten</p>

            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black whitespace-nowrap w-[178px]">Klanttype</p>
              <div id="br-type"></div>
            </div>
            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black w-[178px]">Aanvraag na deadline</p>
              <p id="br-aanvraag" class="inter-bold text-[16px] whitespace-nowrap"></p>
            </div>
            <div class="flex items-start justify-between w-full">
              <p class="inter-regular text-[16px] text-black whitespace-nowrap w-[178px]">Leverinstructies</p>
              <p id="br-instructies" class="inter-bold text-[16px] text-[#1e1e1e] whitespace-nowrap"></p>
            </div>
          </div>

        </div>

        <!-- Right column -->
        <div class="flex flex-col gap-2 min-w-0" style="width: 540.5px;">
          <div class="flex items-center w-full">
            <p class="inter-medium text-[20px] text-black whitespace-nowrap">Maximum per product en klantprijzen</p>
          </div>

          <!-- Product table -->
          <div class="border border-[#b5ae9c] flex flex-col overflow-hidden rounded-[8px] w-full">
            <!-- Dark header -->
            <div class="bg-[#2e2e2e] flex gap-3 items-center px-6 py-3 w-full">
              <div class="flex flex-1 items-center justify-between min-w-0">
                <div class="flex items-center flex-1 min-w-0">
                  <p class="inter-regular text-[#fdfbf7] text-[16px] uppercase">Product</p>
                </div>
                <p class="inter-regular text-[#fdfbf7] text-[16px] uppercase whitespace-nowrap w-[80px] text-right">Prijs €</p>
                <p class="inter-regular text-[#fdfbf7] text-[16px] uppercase text-right w-[60px]">Max</p>
              </div>
            </div>

            <!-- Productrijen dynamisch -->
            <div id="product-rijen"></div>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script>
    const W = window.WolfData;
    const params = new URLSearchParams(window.location.search);
    const klantId = params.get('klant') || 'juno';
    const klant = W.klantById(klantId) || W.KLANTEN[0];

    document.getElementById('bc-klant').textContent = klant.naam;
    document.getElementById('titel-klant').textContent = klant.naam;
    document.getElementById('bewerken-btn').setAttribute('onclick', `window.location.href='1-326-klant-bewerken.html?klant=${klant.id}'`);

    function typePill() {
      if (klant.type === 'uitzondering') {
        return `<div class="bg-[#f4e0c8] flex gap-2 items-center px-3 py-1 rounded-[100px]">
          <div class="w-[7px] h-[7px] rounded-full shrink-0" style="background-color: #c45d1d;"></div>
          <p class="inter-medium text-[#c45d1d] text-[14px] uppercase whitespace-nowrap">Uitzonderingsklant</p></div>`;
      }
      return `<div class="bg-[#e5e1d8] flex gap-2 items-center px-3 py-1 rounded-[100px]">
        <div class="w-[7px] h-[7px] rounded-full shrink-0" style="background-color: #6b6456;"></div>
        <p class="inter-medium text-[#6b6456] text-[14px] uppercase whitespace-nowrap">Standaardklant</p></div>`;
    }
    document.getElementById('type-pill').innerHTML = typePill();

    // Contactgegevens
    document.getElementById('kg-contact').textContent = klant.contact;
    document.getElementById('kg-telefoon').textContent = klant.telefoon;
    document.getElementById('kg-email').textContent = klant.email;
    document.getElementById('kg-adres').innerHTML = klant.adres.map(function (r) {
      return `<p class="inter-bold text-[16px] text-[#1e1e1e] whitespace-nowrap">${r}</p>`;
    }).join('');

    // Bestelrechten
    document.getElementById('br-type').innerHTML = typePill().replace('uppercase ', '');
    const aanvraagEl = document.getElementById('br-aanvraag');
    aanvraagEl.textContent = klant.aanvraagNaDeadline ? 'Toegestaan' : 'Niet toegestaan';
    aanvraagEl.style.color = klant.aanvraagNaDeadline ? '#1c892b' : '#737373';
    document.getElementById('br-instructies').textContent = klant.leverinstructies;

    // Productprijzen-tabel
    document.getElementById('product-rijen').innerHTML = Object.keys(klant.producten).map(function (pid, i) {
      const p = klant.producten[pid];
      const bg = i % 2 === 0 ? 'bg-[#f4f0e7]' : 'bg-[#fdfbf7]';
      return `
        <div class="${bg} flex gap-3 items-center px-6 py-4 w-full">
          <div class="flex flex-1 items-center justify-between min-w-0">
            <div class="flex items-center flex-1 min-w-0"><p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap">${W.PRODUCTEN[pid].naam}</p></div>
            <p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap w-[80px] text-right">${p.prijs}</p>
            <p class="inter-medium text-[16px] text-[#1e1e1e] text-right w-[60px]">${p.max}</p>
          </div>
        </div>`;
    }).join('');
  </script>

</body>
</html>
