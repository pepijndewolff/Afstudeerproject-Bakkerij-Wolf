<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 Aanvragen Overzicht — Bakkerij Wolf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'GT America Extended';
      src: url('assets/GT America Extended Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    :root { --stroke: #b5ae9c; --wolf-white: #f9f7f2; --wolf-grey: #1e1e1e; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    .font-gt-ext-rg { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 400; }
    .font-gt-ext-md { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 600; }
    .font-gt-rg     { font-family: Arial, sans-serif; font-weight: 400; }
    .font-gt-bd     { font-family: Arial, sans-serif; font-weight: 700; }
    .inter-regular  { font-family: 'Inter', sans-serif; font-weight: 400; }
    .inter-medium   { font-family: 'Inter', sans-serif; font-weight: 500; }
    .inter-bold     { font-family: 'Inter', sans-serif; font-weight: 700; }
    a.nav-item { display: flex; flex-direction: column; width: 100%; text-decoration: none; }
    a.nav-item:hover { background-color: rgba(249,247,242,0.5); }
  </style>
</head>
<body class="bg-[#dfdacd] flex flex-col w-full h-full">

  <header class="border-b border-[#b5ae9c] flex items-center justify-between px-8 py-6 shrink-0 w-full">
    <div class="flex gap-5 items-center">
      <div class="h-[30px] w-[27px] shrink-0 relative">
        <img alt="" class="block w-full h-full object-contain" src="assets/wolf logo 1.svg">
      </div>
      <p class="font-gt-ext-rg text-black tracking-[6.4px] uppercase whitespace-nowrap text-[16px]">
        Bakkerij <span class="font-gt-ext-md">Wolf</span>
      </p>
    </div>
    <div class="relative flex items-center bg-[#f9f7f2] rounded-[100px] px-4 py-2 whitespace-nowrap">
      <span class="font-gt-rg text-[14px] text-[#1e1e1e]">Noor</span>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 w-full">
    <aside class="border-r border-[#b5ae9c] flex flex-col h-full shrink-0 w-[271px] pt-10 pb-4">
      <nav class="flex flex-col w-full">
        <a href="1-23-dashboard.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Dashboard</p>
        </a>
        <a href="1-109-bestellingen.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Bestellingen</p>
        </a>
        <a href="1-298-aanvragen.html" class="nav-item bg-[#f9f7f2] border-l-4 border-black px-8 py-3">
          <p class="font-gt-bd text-[18px] text-[#1e1e1e] w-full">Aanvragen</p>
        </a>
        <a href="1-441-paklijst.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Paklijsten</p>
        </a>
        <a href="1-336-klanten-overzicht.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Klanten</p>
        </a>
      </nav>
    </aside>

    <main class="bg-[#f9f7f2] flex flex-1 flex-col gap-6 h-full overflow-y-auto min-w-0 p-10">

      <div class="flex flex-col gap-3 shrink-0 w-full">
        <p id="datum-tijd" class="inter-regular text-[#2e2e2e] text-[16px] w-full"></p>
        <p class="inter-bold text-[32px] text-black w-full">Aanvragen</p>
        <p class="inter-regular text-[#2e2e2e] text-[16px] w-full">Aanvragen na standaard deadline of maximum bestelcapaciteit</p>
      </div>

      <!-- Status cards -->
      <div class="flex gap-6 h-[145px] items-center w-full">
        <div id="card-tebeoordelen" class="bg-[#f4e0c8] border border-[#c45d1d] rounded-[8px] p-6 flex flex-1 flex-col h-full justify-between min-w-0">
          <p class="inter-regular text-[#2e2e2e] text-[16px] tracking-[0.32px] uppercase w-full">Te beoordelen</p>
          <p id="getal-tebeoordelen" class="inter-bold text-[32px] text-[#c45d1d] w-full">0</p>
          <p class="inter-bold text-[#2e2e2e] text-[16px] w-full">Wacht op actie</p>
        </div>
        <div class="bg-[#dfdacd] border border-[#b5ae9c] rounded-[8px] p-6 flex flex-1 flex-col h-full justify-between min-w-0">
          <p class="inter-regular text-[#2e2e2e] text-[16px] tracking-[0.32px] uppercase w-full">Goedgekeurd</p>
          <p id="getal-goedgekeurd" class="inter-bold text-[32px] text-black w-full">0</p>
          <p class="inter-bold text-[#2e2e2e] text-[16px] w-full">Deze week</p>
        </div>
        <div class="bg-[#dfdacd] border border-[#b5ae9c] rounded-[8px] p-6 flex flex-1 flex-col h-full justify-between min-w-0">
          <p class="inter-regular text-[#2e2e2e] text-[16px] tracking-[0.32px] uppercase w-full">Afgewezen</p>
          <p id="getal-afgewezen" class="inter-bold text-[32px] text-black w-full">0</p>
          <p class="inter-bold text-[#2e2e2e] text-[16px] w-full">Deze week</p>
        </div>
      </div>

      <!-- Requests table -->
      <div class="border border-[#b5ae9c] rounded-[8px] overflow-hidden">
        <div class="bg-[#dfdacd] border-b border-[#b5ae9c] flex items-center px-6 py-3 w-full">
          <div class="flex flex-1 items-center justify-between min-w-0">
            <div class="flex items-center w-[236px]">
              <p class="inter-regular text-[#979797] text-[16px] uppercase w-[145px]">klant</p>
            </div>
            <p class="inter-regular text-[#979797] text-[16px] uppercase w-[116px]">Leverdag</p>
            <p class="inter-regular text-[#979797] text-[16px] uppercase whitespace-nowrap">tijdstip</p>
            <p class="inter-regular text-[#979797] text-[16px] uppercase text-right w-[176px]">Reden</p>
          </div>
          <div class="w-5 h-5 shrink-0"></div>
        </div>
        <div id="aanvraag-rijen"></div>
      </div>

    </main>
  </div>

  <script>
    const W = window.WolfData;
    W.bindKlok('datum-tijd');

    const aanvragen = W.getAanvragen();

    const tel = function (s) { return aanvragen.filter(function (a) { return a.status === s; }).length; };
    document.getElementById('getal-tebeoordelen').textContent = String(tel('te-beoordelen'));
    document.getElementById('getal-goedgekeurd').textContent = String(tel('goedgekeurd'));
    document.getElementById('getal-afgewezen').textContent = String(tel('afgewezen'));

    function redenBadge(a) {
      if (a.status === 'goedgekeurd') {
        return `<div class="bg-[#c8f4ce] flex gap-2 items-center px-3 py-1 rounded-[100px]">
          <div class="w-[7px] h-[7px] rounded-full" style="background-color: #1c892b;"></div>
          <p class="inter-medium text-[#1c892b] text-[14px] whitespace-nowrap">Goedgekeurd</p></div>`;
      }
      if (a.status === 'afgewezen') {
        return `<div class="bg-[#f4e0c8] flex gap-2 items-center px-3 py-1 rounded-[100px]">
          <div class="w-[7px] h-[7px] rounded-full" style="background-color: #B8341A;"></div>
          <p class="inter-medium text-[14px] whitespace-nowrap" style="color:#B8341A;">Afgewezen</p></div>`;
      }
      return `<div class="bg-[#f4e0c8] flex gap-2 items-center px-3 py-1 rounded-[100px]">
        <div class="w-[7px] h-[7px] rounded-full" style="background-color: #c45d1d;"></div>
        <p class="inter-medium text-[#c45d1d] text-[14px] whitespace-nowrap">${a.reden}</p></div>`;
    }

    const cont = document.getElementById('aanvraag-rijen');
    cont.innerHTML = aanvragen.map(function (a, i) {
      const bg = i % 2 === 0 ? 'bg-[#f4f0e7]' : 'bg-[#fdfbf7]';
      const hover = i % 2 === 0 ? 'hover:bg-[#f0ebe0]' : 'hover:bg-[#f7f5f0]';
      return `
        <div class="${bg} flex gap-5 items-center pl-6 pr-4 py-4 w-full cursor-pointer ${hover}" onclick="window.location.href='1-234-beoordelen.html?id=${a.id}&van=aanvragen'">
          <div class="flex flex-1 items-center justify-between min-w-0">
            <div class="flex items-center w-[236px]"><p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap">${a.klant}</p></div>
            <div class="flex items-center justify-center"><p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap">${a.weekdag}</p></div>
            <p class="inter-medium text-[16px] text-[#1e1e1e] whitespace-nowrap">${a.tijdstip}</p>
            <div class="flex items-center justify-end w-[176px]">${redenBadge(a)}</div>
          </div>
          <div class="w-5 h-5 shrink-0"><img alt="" class="block w-full h-full object-contain" src="assets/arrow-right.svg"></div>
        </div>`;
    }).join('');
  </script>
</body>
</html>
