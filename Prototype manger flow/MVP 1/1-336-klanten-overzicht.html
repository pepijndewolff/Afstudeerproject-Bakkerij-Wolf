<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7 Klanten overzicht — Bakkerij Wolf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'GT America Extended';
      src: url('assets/GT America Extended Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    :root { --stroke: #b5ae9c; --wolf-white: #f9f7f2; --wolf-grey: #1e1e1e; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    .font-gt-ext-rg { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 400; }
    .font-gt-ext-md { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 600; }
    .font-gt-rg     { font-family: Arial, sans-serif; font-weight: 400; }
    .font-gt-bd     { font-family: Arial, sans-serif; font-weight: 700; }
    .inter-regular  { font-family: 'Inter', sans-serif; font-weight: 400; }
    .inter-medium   { font-family: 'Inter', sans-serif; font-weight: 500; }
    .inter-bold     { font-family: 'Inter', sans-serif; font-weight: 700; }
    a.nav-item { display: flex; flex-direction: column; width: 100%; text-decoration: none; }
    a.nav-item:hover { background-color: rgba(249,247,242,0.5); }
    .klant-rij { cursor: pointer; }
    .klant-rij:hover { filter: brightness(0.97); }
  </style>
</head>
<body class="bg-[#dfdacd] flex flex-col w-full h-full">

  <!-- Top nav bar -->
  <header class="border-b border-[#b5ae9c] flex items-center justify-between px-8 py-6 shrink-0 w-full">
    <div class="flex gap-5 items-center">
      <div class="h-[30px] w-[27px] shrink-0">
        <img alt="" class="block w-full h-full object-contain" src="assets/wolf logo 1.svg">
      </div>
      <p class="font-gt-ext-rg text-black tracking-[6.4px] uppercase whitespace-nowrap text-[16px]">
        Bakkerij <span class="font-gt-ext-md">Wolf</span>
      </p>
    </div>
    <div class="relative flex items-center bg-[#f9f7f2] rounded-[100px] px-4 py-2 whitespace-nowrap">
      <span class="font-gt-rg text-[14px] text-[#1e1e1e]">Noor</span>
    </div>
  </header>

  <div class="flex flex-1 min-h-0 w-full">

    <!-- Sidebar -->
    <aside class="border-r border-[#b5ae9c] flex flex-col h-full shrink-0 w-[271px] pt-10 pb-4">
      <nav class="flex flex-col w-full">
        <a href="1-23-dashboard.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Dashboard</p>
        </a>
        <a href="1-109-bestellingen.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Bestellingen</p>
        </a>
        <a href="1-298-aanvragen.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Aanvragen</p>
        </a>
        <a href="1-441-paklijst.html" class="nav-item border-b border-[#b5ae9c] px-8 py-3">
          <p class="font-gt-rg text-[18px] text-black w-full">Paklijsten</p>
        </a>
        <a href="1-336-klanten-overzicht.html" class="nav-item bg-[#f9f7f2] border-l-4 border-black px-8 py-3">
          <p class="font-gt-bd text-[18px] text-[#1e1e1e] w-full">Klanten</p>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="bg-[#f9f7f2] flex flex-1 flex-col gap-6 h-full overflow-y-auto min-w-0 p-10">

      <!-- Header -->
      <div class="flex flex-col gap-1 shrink-0 w-full">
        <p id="datetime" class="inter-regular text-[#6b6456] text-[16px]"></p>
        <div class="flex items-center justify-between w-full">
          <p class="inter-bold text-[32px] text-black">Klanten</p>
          <a href="1-337-nieuw-klant.html" class="bg-[#2e2e2e] flex items-center gap-2 px-4 py-2 rounded-[100px] hover:bg-[#1e1e1e] no-underline">
            <p class="inter-regular text-[16px] text-white whitespace-nowrap">Nieuwe klant</p>
          </a>
        </div>
      </div>

      <!-- Tabel -->
      <div class="flex flex-col shrink-0 w-full">
        <div class="flex justify-end mb-2">
          <p id="klant-aantal" class="inter-regular text-[#b5ae9c] text-[13px] uppercase tracking-[0.5px]"></p>
        </div>
        <div class="border border-[#b5ae9c] rounded-[8px] overflow-hidden w-full">

          <!-- Tabel header -->
          <div class="bg-[#f0ece3] flex items-center px-6 py-3 w-full">
            <p class="inter-regular text-[#b5ae9c] text-[13px] uppercase tracking-[0.5px] flex-1">Klant</p>
            <p class="inter-regular text-[#b5ae9c] text-[13px] uppercase tracking-[0.5px] w-[220px]">Type</p>
            <p class="inter-regular text-[#b5ae9c] text-[13px] uppercase tracking-[0.5px] w-[200px]">Contactpersoon</p>
            <p class="inter-regular text-[#b5ae9c] text-[13px] uppercase tracking-[0.5px] w-[110px] text-right pr-6">Producten</p>
          </div>

          <!-- Rijen dynamisch vanuit WolfData -->
          <div id="klant-rijen"></div>

        </div>
      </div>

    </main>
  </div>

  <script>
    const W = window.WolfData;
    W.bindKlok('datetime');

    const klanten = W.getKlanten();
    document.getElementById('klant-aantal').textContent = `${klanten.length} klanten`;

    function typePill(k) {
      if (k.type === 'uitzondering') {
        return `<div class="bg-[#f4e0c8] inline-flex gap-2 items-center px-3 py-1 rounded-[100px]">
          <div class="w-[7px] h-[7px] rounded-full bg-[#c45d1d] shrink-0"></div>
          <p class="inter-medium text-[#c45d1d] text-[13px] whitespace-nowrap">Uitzonderingsklant</p></div>`;
      }
      return `<div class="bg-[#e5e1d8] inline-flex gap-2 items-center px-3 py-1 rounded-[100px]">
        <div class="w-[7px] h-[7px] rounded-full bg-[#6b6456] shrink-0"></div>
        <p class="inter-medium text-[#6b6456] text-[13px] whitespace-nowrap">Standaardklant</p></div>`;
    }

    document.getElementById('klant-rijen').innerHTML = klanten.map(function (k, i) {
      const bg = i % 2 === 0 ? 'bg-[#fdfbf7]' : 'bg-[#f4f0e7]';
      const aantalProducten = Object.keys(k.producten).length;
      return `
        <div class="klant-rij ${bg} flex items-center px-6 py-4 w-full border-t border-[#b5ae9c]" onclick="window.location.href='1-536-klant.html?klant=${k.id}'">
          <p class="inter-medium text-[16px] text-[#1e1e1e] flex-1">${k.naam}</p>
          <div class="w-[220px]">${typePill(k)}</div>
          <p class="inter-regular text-[16px] text-[#1e1e1e] w-[200px]">${k.contact}</p>
          <div class="flex items-center justify-end gap-3 w-[110px]">
            <div class="bg-[#e5e1d8] flex items-center justify-center px-3 py-1 rounded-[100px] min-w-[32px]">
              <p class="inter-medium text-[14px] text-[#6b6456]">${aantalProducten}</p>
            </div>
            <svg width="7" height="12" viewBox="0 0 7 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L6 6L1 11" stroke="#b5ae9c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>`;
    }).join('');
  </script>

</body>
</html>
