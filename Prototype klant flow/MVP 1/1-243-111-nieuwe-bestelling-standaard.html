<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leverdag kiezen — Bakkerij Wolf Bestelportaal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'GT America Extended';
      src: url('assets/GT America Extended Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    :root { --stroke: #b5ae9c; --wolf-white: #f9f7f2; --wolf-grey: #1e1e1e; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
    .font-gt-ext { font-family: 'GT America Extended', "Arial Narrow", Arial, sans-serif; font-weight: 400; }
    .sidebar-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; color: #000; position: relative; white-space: nowrap; }
    .sidebar-item:hover { background: rgba(0,0,0,0.04); }
    .sidebar-item.actief { background: #f9f7f2; font-weight: 500; color: #1e1e1e; }
    .sidebar-item.actief::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #1e1e1e; border-radius: 0 2px 2px 0; }
    .week-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; color: #2e2e2e; border: 1px solid #c8c3b6; transition: background 0.12s; }
    .week-tab:hover { background: rgba(0,0,0,0.04); }
    .week-tab.actief { background: #2e2e2e; color: #f9f7f2; border-color: #2e2e2e; }
    .dag-kaart { background: #f4f0e7; border-radius: 12px; padding: 18px 16px; display: flex; flex-direction: column; justify-content: space-between; width: 180px; flex-shrink: 0; }
    .dag-kaart-dim { opacity: 0.7; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 99px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; margin-bottom: 8px; }
    .badge-beschikbaar { background: #c8f4cd; color: #1c882a; }
    .badge-gesloten { background: #ffa9a9; color: #bf1515; }
    .kies-knop { display: flex; align-items: center; justify-content: center; padding: 9px 12px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; transition: background 0.15s; }
    .kies-knop-actief { background: #2e2e2e; color: #f9f7f2; cursor: pointer; }
    .kies-knop-actief:hover { background: #1a1a1a; }
    .kies-knop-uitgeschakeld { background: #2e2e2e; color: #f9f7f2; opacity: 0.4; cursor: not-allowed; }
    .breadcrumb-item { font-family: 'Inter', sans-serif; font-size: 13px; color: #2e2e2e; }

    /* Kalender */
    .kalender-grid { display: grid; grid-template-columns: repeat(7, 36px); gap: 4px; }
    .kal-dag { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; color: #2e2e2e; }
    .kal-dag-naam { font-size: 11px; color: #979797; font-weight: 500; }
    .kal-leverdag { background: #f4f0e7; cursor: pointer; font-weight: 500; }
    .kal-leverdag:hover { background: #e8e2d8; }
    .kal-leverdag.gesloten { background: #ffa9a9; color: #bf1515; cursor: not-allowed; opacity: 0.6; }
    .kal-leeg { }
    .kal-vandaag { border: 2px solid #2e2e2e; }
  </style>
</head>
<body class="bg-[#ded9cc]" style="min-height:100vh;">

  <div class="flex flex-col" style="min-height:100vh;">

    <!-- Header -->
    <header class="bg-[#ded9cc] flex items-center justify-between px-6 py-4 border-b border-[#c8c3b6]">
      <div class="flex items-center gap-4">
        <div class="w-[28px] h-[32px] shrink-0">
          <img alt="Wolf logo" class="w-full h-full object-contain" src="assets/wolf logo 1.svg">
        </div>
        <span class="font-gt-ext text-black tracking-[8px] uppercase text-[16px]">Bakkerij <strong>Wolf</strong></span>
      </div>
      <div class="bg-[#f9f7f2] rounded-full px-4 py-1.5">
        <span id="nav-naam" class="font-gt-ext text-[#1e1e1e] text-[14px]">Juno</span>
      </div>
    </header>

    <div class="flex flex-1">

      <!-- Sidebar -->
      <aside class="bg-[#ded9cc] flex flex-col justify-between border-r border-[#c8c3b6]" style="width:185px; min-height:calc(100vh - 57px);">
        <nav class="flex flex-col pt-2">
          <div class="sidebar-item" onclick="window.location.href='1-240-1583-klant-dashboard.html'">Overzicht</div>
          <div class="sidebar-item actief">Nieuwe bestelling</div>
          <div class="sidebar-item" onclick="window.location.href='1-363-344-bestelgeschiedenis.html'">Bestel geschiedenis</div>
        </nav>
        <div class="sidebar-item text-[#2e2e2e] mb-2" onclick="window.location.href='1-364-544-klant-account.html'">Mijn account</div>
      </aside>

      <!-- Hoofdinhoud -->
      <main class="bg-[#f9f7f2] flex-1 p-10">

        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 mb-3">
          <a href="1-240-1583-klant-dashboard.html" class="breadcrumb-item hover:underline">Nieuwe bestelling</a>
          <span class="breadcrumb-item">›</span>
          <span class="breadcrumb-item font-medium">Leverdag kiezen</span>
        </div>

        <h1 class="font-['Inter',sans-serif] font-bold text-[28px] text-black mb-1">Kies leverdag</h1>
        <p class="font-['Inter',sans-serif] text-[15px] text-[#2e2e2e] mb-6">Kies wanneer je je bestelling wilt ontvangen.</p>

        <!-- Week tabs -->
        <div class="flex items-center gap-2 mb-6">
          <div class="week-tab actief" id="tab-23" onclick="toonWeek(23)">
            <div class="text-[11px] tracking-widest uppercase font-medium" style="opacity:0.7;">Week 23</div>
            <div class="font-semibold text-[14px] mt-0.5">2–7 juni</div>
          </div>
          <div class="week-tab" id="tab-24" onclick="toonWeek(24)">
            <div class="text-[11px] tracking-widest uppercase font-medium" style="opacity:0.7;">Week 24</div>
            <div class="font-semibold text-[14px] mt-0.5">9–14 juni</div>
          </div>
          <div class="week-tab" id="tab-25" onclick="toonWeek(25)">
            <div class="text-[11px] tracking-widest uppercase font-medium" style="opacity:0.7;">Week 25</div>
            <div class="font-semibold text-[14px] mt-0.5">16–21 juni</div>
          </div>
          <div class="week-tab flex items-center gap-2" id="tab-kal" onclick="toonKalender()">
            <img alt="" src="assets/calendar.svg" class="w-4 h-4" style="opacity:0.6;">
            <span class="font-medium text-[14px]">Kalender</span>
          </div>
        </div>

        <!-- Leverdag kaarten (per week) -->
        <div id="kaarten-container" class="flex gap-4 pb-2"></div>

        <!-- Kalender view (verborgen by default) -->
        <div id="kalender-container" style="display:none;">
          <div class="bg-[#ded9cc] rounded-[12px] p-5 inline-block">
            <p class="font-['Inter',sans-serif] font-semibold text-[15px] text-black mb-4">Juni 2026</p>
            <div class="kalender-grid mb-1">
              <div class="kal-dag kal-dag-naam">ma</div>
              <div class="kal-dag kal-dag-naam">di</div>
              <div class="kal-dag kal-dag-naam">wo</div>
              <div class="kal-dag kal-dag-naam">do</div>
              <div class="kal-dag kal-dag-naam">vr</div>
              <div class="kal-dag kal-dag-naam">za</div>
              <div class="kal-dag kal-dag-naam">zo</div>
            </div>
            <div id="kalender-grid" class="kalender-grid"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script>
    const naam = sessionStorage.getItem('klant_naam') || 'Juno';
    document.getElementById('nav-naam').textContent = naam;

    const WEKEN = {
      23: { label: '2–7 juni', dagen: [
        { datum: 'Dinsdag 2 juni',    dag: 'dinsdag',   week: 'Week 23', status: 'gesloten',    info: 'Deadline verstreken (zondag 15:00)' },
        { datum: 'Donderdag 4 juni',  dag: 'donderdag', week: 'Week 23', status: 'beschikbaar', info: 'Bestellen tot dinsdag 15:00' },
        { datum: 'Zaterdag 6 juni',   dag: 'zaterdag',  week: 'Week 23', status: 'beschikbaar', info: 'Bestellen tot donderdag 15:00' },
      ]},
      24: { label: '9–14 juni', dagen: [
        { datum: 'Dinsdag 9 juni',    dag: 'dinsdag',   week: 'Week 24', status: 'beschikbaar', info: 'Bestellen tot zondag 15:00' },
        { datum: 'Donderdag 11 juni', dag: 'donderdag', week: 'Week 24', status: 'beschikbaar', info: 'Bestellen tot dinsdag 15:00' },
        { datum: 'Zaterdag 13 juni',  dag: 'zaterdag',  week: 'Week 24', status: 'beschikbaar', info: 'Bestellen tot donderdag 15:00' },
      ]},
      25: { label: '16–21 juni', dagen: [
        { datum: 'Dinsdag 16 juni',   dag: 'dinsdag',   week: 'Week 25', status: 'beschikbaar', info: 'Bestellen tot zondag 15:00' },
        { datum: 'Donderdag 18 juni', dag: 'donderdag', week: 'Week 25', status: 'beschikbaar', info: 'Bestellen tot dinsdag 15:00' },
        { datum: 'Zaterdag 20 juni',  dag: 'zaterdag',  week: 'Week 25', status: 'beschikbaar', info: 'Bestellen tot donderdag 15:00' },
      ]},
    };

    function toonWeek(nr) {
      document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('actief'));
      document.getElementById('tab-' + nr).classList.add('actief');
      document.getElementById('kalender-container').style.display = 'none';
      document.getElementById('kaarten-container').style.display = 'flex';

      const container = document.getElementById('kaarten-container');
      container.innerHTML = '';
      WEKEN[nr].dagen.forEach(d => container.appendChild(maakKaart(d)));
    }

    function toonKalender() {
      document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('actief'));
      document.getElementById('tab-kal').classList.add('actief');
      document.getElementById('kaarten-container').style.display = 'none';
      document.getElementById('kalender-container').style.display = 'block';
      renderKalender();
    }

    function maakKaart(d) {
      const el = document.createElement('div');
      el.className = 'dag-kaart' + (d.status === 'gesloten' ? ' dag-kaart-dim' : '');
      if (d.status === 'beschikbaar') el.style.cursor = 'pointer';

      const badgeKlasse = d.status === 'beschikbaar' ? 'badge-beschikbaar' : 'badge-gesloten';
      const badgeTekst  = d.status === 'beschikbaar' ? 'Beschikbaar' : 'Gesloten';
      const knopKlasse  = d.status === 'beschikbaar' ? 'kies-knop-actief' : 'kies-knop-uitgeschakeld';
      const knopTekst   = d.status === 'beschikbaar' ? 'Kies ' + d.dag : 'Niet beschikbaar';

      el.innerHTML = `
        <div>
          <span class="badge ${badgeKlasse}">${badgeTekst}</span>
          <div class="font-['Inter',sans-serif] font-bold text-[17px] text-black leading-tight">${d.datum}</div>
          <div class="font-['Inter',sans-serif] text-[12px] text-[#2e2e2e] mt-1">${d.week}</div>
          <div class="font-['Inter',sans-serif] text-[13px] text-black mt-2 leading-snug">${d.info}</div>
        </div>
        <div class="mt-4">
          <div class="kies-knop ${knopKlasse}">${knopTekst}</div>
        </div>`;

      if (d.status === 'beschikbaar') {
        el.addEventListener('click', () => kiesLeverdag(d.datum, d.dag));
      }
      return el;
    }

    function kiesLeverdag(label, dag) {
      sessionStorage.setItem('leverdag_label', label);
      sessionStorage.setItem('leverdag_dag', dag);
      sessionStorage.setItem('is_aanvraag', 'false');
      sessionStorage.removeItem('herhaal_nr');
      window.location.href = '1-244-472-producten-kiezen.html';
    }

    // Kalender Juni 2026 (1 juni = maandag = dag 0)
    function renderKalender() {
      const LEVERDAGEN = new Set([2,4,6,9,11,13,16,18,20,23,25,27,30]);
      const GESLOTEN   = new Set([2]); // deadline verstreken voor standaard klant
      const grid = document.getElementById('kalender-grid');
      grid.innerHTML = '';

      // Juni 2026: 1 = maandag → offset 0
      for (let dag = 1; dag <= 30; dag++) {
        const cel = document.createElement('div');
        cel.className = 'kal-dag';
        cel.textContent = dag;

        if (dag === 1) cel.classList.add('kal-vandaag');

        if (LEVERDAGEN.has(dag)) {
          if (GESLOTEN.has(dag)) {
            cel.classList.add('kal-leverdag', 'gesloten');
          } else {
            cel.classList.add('kal-leverdag');
            const datumLabel = kalDatumLabel(dag);
            const dagNaam = kalDagNaam(dag);
            cel.addEventListener('click', () => kiesLeverdag(datumLabel, dagNaam));
          }
        }
        grid.appendChild(cel);
      }
    }

    const DAG_NAMEN = ['','','dinsdag','','donderdag','','zaterdag',''];
    const MAANDEN = ['','januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
    // Juni 2026: dag 1=ma,2=di,3=wo,4=do,5=vr,6=za, 7=zo, 8=ma...
    const DAGOFWEEK = ['ma','di','wo','do','vr','za','zo']; // (dag-1)%7

    function kalDagNaam(dag) {
      const idx = (dag - 1) % 7;
      const namen = ['','dinsdag','','donderdag','','zaterdag',''];
      return namen[idx] || 'dag';
    }

    function kalDatumLabel(dag) {
      const idx = (dag - 1) % 7;
      const voluit = ['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
      const map = { dinsdag:'Dinsdag', donderdag:'Donderdag', zaterdag:'Zaterdag' };
      const dagstr = voluit[idx];
      const kort = dagstr.charAt(0).toUpperCase() + dagstr.slice(1);
      return `${kort} ${dag} juni`;
    }

    // Start met week 23
    toonWeek(23);
  </script>
</body>
</html>
